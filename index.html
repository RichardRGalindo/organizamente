/* ── Ring ── */
function Ring({ pct, size=64, stroke=6, color="#6366f1" }) {
  const r = size/2 - stroke;
  const circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size} aria-label={pct+"% concluído"} role="img">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
        strokeLinecap="round" transform={"rotate(-90 "+(size/2)+" "+(size/2)+")"}
        style={{transition:"stroke-dashoffset .6s ease"}}/>
      <text x="50%" y="50%" textAnchor="middle" dy=".35em" fontSize={size*.22} fontWeight="700" fill="currentColor">{pct}%</text>
    </svg>
  );
}

function Dashboard({ th, accent, mood, tasks, wGoals, userName, selectMood, toggleTask, MOTIVATIONAL, motivIdx }) {
  const done    = tasks.filter(t => t.done).length;
  const total   = tasks.length;
  const pct     = total ? Math.round((done/total)*100) : 0;
  const pending = tasks.filter(t => !t.done);
  const urgent  = pending.filter(t => t.pri==="Alta");
  const wl = pending.length<=2 ? {label:"Leve ✅",    bg:"#dcfce7",c:"#15803d"}
           : pending.length<=4 ? {label:"Moderada ⚠️",bg:"#fef9c3",c:"#a16207"}

    <div className="fade-in">
      <div style={{...card, background:accent.grad, border:"none", color:"#fff", padding:28}}>
        <p style={{fontSize:13,opacity:.85,marginBottom:4}}>📅 {new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</p>
        <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>{userName ? "Olá, "+userName+"! 👋" : "Olá! Como você está hoje? 👋"}</h2>
        <p style={{fontSize:14,opacity:.9,lineHeight:1.6}}>{MOTIVATIONAL[motivIdx]}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div style={{...card,marginBottom:0,textAlign:"center"}}>
          <p style={{fontSize:11,color:th.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Progresso</p>

          <p style={{fontSize:12,color:th.sub}}>{done} de {total} tarefas</p>
        </div>
        <div style={{...card,marginBottom:0}}>
          <p style={{fontSize:11,color:th.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Carga Mental</p>

        </div>

            const active = mood && mood.id===m.id;
            return (
              <button key={m.id} aria-label={"Humor: "+m.label} aria-pressed={active}

                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 14px",
                  borderRadius:14,border:"2px solid "+(active?m.col:th.border),

                {CATS.map(c=><option key={c}>{c}</option>)}

            <div>

              <select id="tPri" value={tPri} onChange={e=>setTPri(e.target.value)} style={{...selectSt,width:"100%"}}>
                {PRIS.map(p=><option key={p}>{p}</option>)}

            <div>
              <label htmlFor="tDate" style={{fontSize:11,color:th.muted,display:"block",marginBottom:3}}>Data limite</label>

          <div style={{position:"relative",flex:1,minWidth:160}}>

            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar tarefa..."
              aria-label="Buscar tarefa" style={{...inp,paddingLeft:32}}/>
          </div>
          <div>
            <label htmlFor="fCat" style={{fontSize:10,color:th.muted,display:"block",marginBottom:2}}>Categoria</label>

          </div>
          <div>
            <label htmlFor="fPri" style={{fontSize:10,color:th.muted,display:"block",marginBottom:2}}>Prioridade</label>

function Planner({ th, accent, calMonth, setCalMonth, calDays, taskDates, weekPlan, setWeekPlan, wpInput, setWpInput, mGoal, setMGoal, mGoalInput, setMGoalInput, toast }) {
  const card = { background:th.surface, borderRadius:20, border:"1px solid "+th.border, padding:24, marginBottom:16 };
  const inp  = { width:"100%", padding:"11px 14px", borderRadius:12, border:"1.5px solid "+th.border, fontSize:14, color:th.text, outline:"none", boxSizing:"border-box", background:th.input };
  const btnS = (bg) => ({ display:"inline-flex", alignItems:"center", gap:6, padding:"10px 20px", background:bg, color:"#fff", borderRadius:12, border:"none", fontSize:14, fontWeight:700, cursor:"pointer" });
  const { y, m } = calMonth;
  const { first, days } = calDays;
  const monthName = new Date(y,m,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const todayStr  = new Date().toLocaleDateString("pt-BR");
  const cells = [];
  for (let i=0;i<first;i++) cells.push(null);
  for (let d=1;d<=days;d++) {
    const dateStr = new Date(y,m,d).toLocaleDateString("pt-BR");
    cells.push({ d, dateStr, isToday:dateStr===todayStr, hasTasks:taskDates.has(dateStr) });
  }
  const weekDays = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const addWpItem = day => {
    if (!wpInput[day]||!wpInput[day].trim()) return;
    setWeekPlan(p => ({...p, [day]:[...p[day], wpInput[day].trim()]}));
    setWpInput(p => ({...p, [day]:""}));
  };
  const delWpItem = (day, i) => setWeekPlan(p => ({...p, [day]:p[day].filter((_,j)=>j!==i)}));
  return (
    <div className="fade-in">
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button aria-label="Mês anterior"
            onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})}
            style={{background:th.hover,border:"1px solid "+th.border,borderRadius:10,padding:"6px 10px",cursor:"pointer",color:th.text,display:"flex",alignItems:"center"}}>
            <IChevL s={16}/>
          </button>
          <h3 style={{fontSize:15,fontWeight:700,color:th.text,textTransform:"capitalize"}}>{monthName}</h3>
          <button aria-label="Próximo mês"
            onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})}
            style={{background:th.hover,border:"1px solid "+th.border,borderRadius:10,padding:"6px 10px",cursor:"pointer",color:th.text,display:"flex",alignItems:"center"}}>
            <IChevR s={16}/>
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {weekDays.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:th.muted,padding:"2px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}} role="grid" aria-label="Calendário mensal">
          {cells.map((c,i) => c===null ? <div key={"e"+i}/> : (
            <div key={c.d} role="gridcell" aria-label={c.dateStr+(c.hasTasks?" — possui tarefas":"")}
              style={{position:"relative",textAlign:"center",padding:"6px 2px",borderRadius:8,
                background:c.isToday?accent.val:c.hasTasks?accent.val+"22":th.hover,
                color:c.isToday?"#fff":th.text,fontSize:12,fontWeight:c.isToday?700:400,
                border:"1px solid "+(c.isToday?accent.val:th.border),cursor:"default"}}>
              {c.d}
              {c.hasTasks&&!c.isToday&&<span aria-hidden="true" style={{position:"absolute",top:2,right:3,width:5,height:5,borderRadius:"50%",background:accent.val,display:"block"}}/>}
            </div>
          ))}
        </div>
        <p style={{fontSize:11,color:th.muted,marginTop:10}}>● Dias com tarefas agendadas</p>
      </div>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <ICalendar s={17} c={accent.val}/>
          <span style={{fontSize:15,fontWeight:700,color:th.text}}>Planejamento Semanal</span>
        </div>
        {Object.keys(weekPlan).map(day => (
          <div key={day} style={{marginBottom:16}}>
            <p style={{fontSize:12,fontWeight:700,color:accent.val,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>{day}</p>
            {weekPlan[day].map((item,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:10,background:th.hover,border:"1px solid "+th.border,marginBottom:4}}>
                <span style={{flex:1,fontSize:13,color:th.text}}>{item}</span>
                <button aria-label={"Remover "+item+" de "+day} onClick={()=>delWpItem(day,i)}
                  style={{background:"none",border:"none",cursor:"pointer",color:th.muted,padding:0,display:"flex"}}
                  onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"}
                  onMouseLeave={e=>e.currentTarget.style.color=th.muted}>
                  <IX s={13}/>
                </button>
              </div>
            ))}
            <div style={{display:"flex",gap:6}}>
              <input value={wpInput[day]||""} onChange={e=>setWpInput(p=>({...p,[day]:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter")addWpItem(day);}}
                placeholder={"Adicionar para "+day+"..."} aria-label={"Atividade de "+day}
                style={{...inp,flex:1,padding:"8px 12px",fontSize:13}}/>
              <button aria-label={"Adicionar em "+day} onClick={()=>addWpItem(day)}
                style={{...btnS(accent.grad),padding:"8px 14px"}}>
                <IPlus s={14}/>
              </button>
            </div>
          </div>
        ))}
      </div>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <IStar s={17} c="#f59e0b"/>
          <span style={{fontSize:15,fontWeight:700,color:th.text}}>Meta Principal do Mês</span>
        </div>
        <p style={{fontSize:12,color:th.muted,marginBottom:14}}>{"🗓️ "+new Date().toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}</p>
        {mGoal ? (
          <div style={{padding:"14px 16px",borderRadius:14,background:"#fffbeb",border:"1.5px solid #fcd34d",display:"flex",alignItems:"center",gap:10}}>
            <IStar s={18} c="#f59e0b"/>
            <p style={{flex:1,fontSize:15,fontWeight:600,color:"#92400e",margin:0}}>{mGoal}</p>
            <button aria-label="Editar meta do mês" onClick={()=>{setMGoalInput(mGoal);setMGoal("");}}
              style={{background:"none",border:"none",cursor:"pointer",color:"#f59e0b",padding:0,display:"flex"}}><IEdit s={16}/></button>
          </div>
        ) : (
          <div style={{display:"flex",gap:8}}>
            <input value={mGoalInput} onChange={e=>setMGoalInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&mGoalInput.trim()){setMGoal(mGoalInput);setMGoalInput("");toast("Meta do mês salva! 🌟");}}}
              placeholder="Qual é a sua meta para este mês?" aria-label="Meta do mês" style={{...inp,flex:1}}/>
            <button aria-label="Salvar meta do mês"
              onClick={()=>{if(mGoalInput.trim()){setMGoal(mGoalInput);setMGoalInput("");toast("Meta do mês salva! 🌟");}}}
              style={{...btnS("linear-gradient(135deg,#f59e0b,#fbbf24)"),gap:6}}>
              <ISave s={15}/> Salvar
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function Goals({ th, accent, wGoals, wInput, setWInput, addWGoal, toggleWGoal, delWGoal }) {
  const card = { background:th.surface, borderRadius:20, border:"1px solid "+th.border, padding:24, marginBottom:16 };
  const inp  = { width:"100%", padding:"11px 14px", borderRadius:12, border:"1.5px solid "+th.border, fontSize:14, color:th.text, outline:"none", boxSizing:"border-box", background:th.input };
  const btnS = (bg) => ({ display:"inline-flex", alignItems:"center", gap:6, padding:"10px 20px", background:bg, color:"#fff", borderRadius:12, border:"none", fontSize:14, fontWeight:700, cursor:"pointer" });
  const wDone = wGoals.filter(g=>g.done).length;
  const wPct  = wGoals.length ? Math.round((wDone/wGoals.length)*100) : 0;
  return (
    <div className="fade-in">
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <ITarget s={18} c={accent.val}/>
            <span style={{fontSize:15,fontWeight:700,color:th.text}}>Metas da Semana</span>
          </div>
          {wGoals.length>0 && <Ring pct={wPct} size={52} stroke={5} color={accent.val}/>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={wInput} onChange={e=>setWInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addWGoal()}
            placeholder="Nova meta da semana..." aria-label="Nova meta da semana" style={{...inp,flex:1}}/>
          <button onClick={addWGoal} style={btnS(accent.grad)}><IPlus s={15}/> Adicionar</button>
        </div>
        {wGoals.length===0 ? (
          <div style={{textAlign:"center",padding:"28px 0",color:th.muted}} role="status">
            <ITarget s={34} c={th.border} style={{display:"block",margin:"0 auto 10px"}}/>
            <p style={{fontSize:14,margin:0}}>Defina suas metas para a semana 🎯</p>
          </div>
        ) : (
          <ul style={{listStyle:"none",margin:0,padding:0,display:"flex",flexDirection:"column",gap:8}} role="list" aria-label="Lista de metas">
            {wGoals.map(g => (
              <li key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:14,
                border:"1.5px solid "+(g.done?"transparent":th.border),
                background:g.done?th.hover:th.surface,opacity:g.done?.6:1,transition:"all .2s"}}>
                <button onClick={()=>toggleWGoal(g.id)}
                  aria-label={(g.done?"Reabrir":"Concluir")+" meta: "+g.text}
                  style={{background:"none",border:"none",cursor:"pointer",color:g.done?accent.val:th.muted,padding:0,display:"flex",flexShrink:0}}>
                  {g.done?<ICheck s={20}/>:<ISquare s={20}/>}
                </button>
                <span style={{flex:1,fontSize:14,color:g.done?th.muted:th.text,textDecoration:g.done?"line-through":"none"}}>{g.text}</span>
                <button onClick={()=>delWGoal(g.id)} aria-label={"Excluir meta: "+g.text}
                  style={{background:"none",border:"none",cursor:"pointer",color:th.muted,padding:0,display:"flex",flexShrink:0}}
                  onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"}
                  onMouseLeave={e=>e.currentTarget.style.color=th.muted}>
                  <ITrash s={15}/>
                </button>
              </li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

function Stats({ th, accent, tasks, moodLog }) {
  const done    = tasks.filter(t => t.done).length;
  const total   = tasks.length;
  const pending = tasks.filter(t => !t.done);
  const card = { background:th.surface, borderRadius:20, border:"1px solid "+th.border, padding:24, marginBottom:16 };

  const tasksByDay = useMemo(()=>{
    const map={};
    tasks.filter(t=>t.done&&t.created).forEach(t=>{map[t.created]=(map[t.created]||0)+1;});
    return Object.entries(map).sort().slice(-7);
  },[tasks]);

  const moodStats = useMemo(() => {
    const counts = {};
    moodLog.forEach(l => { counts[l.mood.label]=(counts[l.mood.label]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  }, [moodLog]);

  const maxVal = Math.max(...tasksByDay.map(([,v])=>v),1);
  return (
    <div className="fade-in">
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <IBar s={18} c={accent.val}/>
          <span style={{fontSize:15,fontWeight:700,color:th.text}}>Histórico de Produtividade</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}}>
          {[{l:"Total",v:total,c:accent.val},{l:"Concluídas",v:done,c:"#10b981"},{l:"Pendentes",v:pending.length,c:"#f59e0b"}].map(s=>(
            <div key={s.l} style={{textAlign:"center",padding:"14px 8px",borderRadius:14,border:"1.5px solid "+th.border,background:th.hover}}>
              <p style={{fontSize:24,fontWeight:800,color:s.c,margin:"0 0 4px"}}>{s.v}</p>
              <p style={{fontSize:11,color:th.muted,margin:0}}>{s.l}</p>
            </div>
          ))}
        </div>
        {tasksByDay.length>0 ? (
          <>
            <p style={{fontSize:12,color:th.muted,marginBottom:10}}>Tarefas concluídas por dia (últimos 7 dias)</p>
            <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}} role="img" aria-label="Gráfico de barras de produtividade">
              {tasksByDay.map(([d,v])=>(
                <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{width:"100%",background:accent.grad,borderRadius:"6px 6px 0 0",height:(Math.round((v/maxVal)*64)+8)+"px",transition:"height .5s ease"}}/>
                  <span style={{fontSize:9,color:th.muted}}>{d.split("/").slice(0,2).join("/")}</span>
                </div>
              ))}
            </div>
          </>
        ) : (
          <p style={{fontSize:13,color:th.muted,textAlign:"center",padding:"16px 0"}}>Nenhuma tarefa concluída ainda.</p>
        )}
      </div>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <IHeart s={18} c="#fb7185"/>
          <span style={{fontSize:15,fontWeight:700,color:th.text}}>Histórico Emocional</span>
        </div>
        {moodLog.length===0 ? (
          <p style={{fontSize:13,color:th.muted,textAlign:"center",padding:"16px 0"}}>Registre seu humor diariamente para ver o histórico.</p>
        ) : (
          <>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {moodStats.map(([label,cnt])=>{
                const mm=MOODS.find(x=>x.label===label);
                return mm ? (
                  <div key={label} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,background:mm.bg,border:"1px solid "+mm.border}}>
                    <span style={{fontSize:16}}>{mm.emoji}</span>
                    <span style={{fontSize:12,fontWeight:600,color:mm.text}}>{label}</span>
                    <span style={{fontSize:11,color:mm.text,opacity:.7}}>{"×"+cnt}</span>
                  </div>
                ) : null;
              })}
            </div>
            <p style={{fontSize:11,color:th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Últimos registros</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {moodLog.slice(0,10).map((l,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:th.hover,border:"1px solid "+th.border}}>
                  <span style={{fontSize:18}}>{l.mood.emoji}</span>
                  <div style={{flex:1}}>
                    <p style={{fontSize:13,fontWeight:600,color:th.text,margin:0}}>{l.mood.label}</p>
                    <p style={{fontSize:11,color:th.muted,margin:0}}>{l.date}</p>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════
   APP — only state & orchestration
   ══════════════════════════════ */
function App() {
  const [darkMode,  setDarkMode]  = useState(false);
  const [accentIdx, setAccentIdx] = useState(0);
  const [userName,  setUserName]  = useState("");
  const [nameInput, setNameInput] = useState("");
  const accent = ACCENT_COLORS[accentIdx];

  const th = darkMode
    ? { bg:"#0f172a", surface:"#1e293b", border:"#334155", text:"#e2e8f0", sub:"#94a3b8", muted:"#475569", input:"#1e293b", hover:"#334155" }
    : { bg:"#f0f4ff", surface:"#fff",    border:"#e0e7ff", text:"#1e293b", sub:"#64748b", muted:"#94a3b8", input:"#fafbff", hover:"#f8faff" };

  useEffect(() => {
    document.body.style.background = th.bg;
    document.body.style.color = th.text;
    document.documentElement.style.setProperty("--accent", accent.val);
    document.documentElement.style.setProperty("--scrollbar", darkMode ? "#334155" : "#c7d2fe");
  }, [darkMode, accentIdx]);

  const [page,       setPage]       = useState("dashboard");
  const [mood,       setMood]       = useState(null);
  const [moodLog,    setMoodLog]    = useState([]);
  const [tasks,      setTasks]      = useState([]);
  const [tTitle,     setTTitle]     = useState("");
  const [tCat,       setTCat]       = useState("Estudos");
  const [tPri,       setTPri]       = useState("Alta");
  const [tDate,      setTDate]      = useState("");
  const [search,     setSearch]     = useState("");
  const [fCat,       setFCat]       = useState("Todas");
  const [fPri,       setFPri]       = useState("Todas");
  const [draft,      setDraft]      = useState("");
  const [entries,    setEntries]    = useState([]);
  const [wGoals,     setWGoals]     = useState([]);
  const [mGoal,      setMGoal]      = useState("");
  const [mGoalInput, setMGoalInput] = useState("");
  const [wInput,     setWInput]     = useState("");
  const [weekPlan,   setWeekPlan]   = useState({ Seg:[], Ter:[], Qua:[], Qui:[], Sex:[], Sáb:[], Dom:[] });
  const [wpInput,    setWpInput]    = useState({});
  const [calMonth,   setCalMonth]   = useState(() => { const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  const [sosOpen,      setSosOpen]      = useState(false);
  const [pIdx,         setPIdx]         = useState(null);
  const [count,        setCount]        = useState(0);
  const [cycles,       setCycles]       = useState(0);
  const [toasts,       setToasts]       = useState([]);
  const [confirm,      setConfirm]      = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showHelp,     setShowHelp]     = useState(false);
  const [onboarding,   setOnboarding]   = useState(true);
  const [obStep,       setObStep]       = useState(0);

  const timerRef   = useRef(null);
  const stRef      = useRef({});
  const motivIdx   = useRef(Math.floor(Math.random()*MOTIVATIONAL.length));
  const toastIdRef = useRef(0);

  const toast = useCallback((msg, type="success") => {
    const id = ++toastIdRef.current;
    setToasts(p => [...p, { id, msg, type, out:false }]);
    setTimeout(() => setToasts(p => p.map(t => t.id===id ? {...t, out:true} : t)), 3200);
    setTimeout(() => setToasts(p => p.filter(t => t.id!==id)), 3700);
  }, []);

  const askConfirm = useCallback((msg, onOk) => setConfirm({ msg, onOk }), []);

  const filteredTasks = useMemo(() => {
    let arr = [...tasks];
    if (fCat!=="Todas") arr = arr.filter(t => t.cat===fCat);
    if (fPri!=="Todas") arr = arr.filter(t => t.pri===fPri);
    if (search.trim()) arr = arr.filter(t => t.title.toLowerCase().includes(search.toLowerCase()));
    return arr.sort((a,b) => {
      if (a.done!==b.done) return a.done?1:-1;
      return PRI_ORDER[a.pri]-PRI_ORDER[b.pri];
    });
  }, [tasks, fCat, fPri, search]);

  const calDays = useMemo(() => {
    const { y, m } = calMonth;
    const first = new Date(y, m, 1).getDay();
    const days  = new Date(y, m+1, 0).getDate();
    return { first, days };
  }, [calMonth]);

  const taskDates = useMemo(() => {
    const s = new Set();
    tasks.forEach(t => { if (t.date) s.add(t.date); });
    return s;
  }, [tasks]);

  const selectMood = m => {
    setMood(m);
    if (m) setMoodLog(p => [{ mood:m, date:nowStr(), day:todayKey() }, ...p.slice(0,29)]);
  };

  const addTask = () => {
    if (!tTitle.trim()) { toast("Digite o título da tarefa.", "error"); return; }
    setTasks(p => [...p, { id:Date.now(), title:tTitle.trim(), cat:tCat, pri:tPri, date:tDate, done:false, created:todayKey() }]);
    setTTitle(""); setTDate("");
    toast("Tarefa criada com sucesso! ✅");
  };
  const toggleTask = id => setTasks(p => p.map(t => t.id===id ? {...t, done:!t.done} : t));
  const delTask    = id => askConfirm("Deseja realmente excluir esta tarefa?", () => {
    setTasks(p => p.filter(t => t.id!==id));
    toast("Tarefa excluída.");
  });

  const saveEntry = () => {
    if (!draft.trim()) { toast("Escreva algo antes de salvar.", "error"); return; }
    setEntries(p => [{ id:Date.now(), text:draft.trim(), mood:mood?mood.label:"—", date:nowStr() }, ...p]);
    setDraft(""); toast("Relato salvo! 📖");
  };
  const delEntry = id => askConfirm("Deseja excluir este relato do diário?", () => {
    setEntries(p => p.filter(e => e.id!==id));
    toast("Relato excluído.");
  });

  const addWGoal    = () => { if (!wInput.trim()) return; setWGoals(p => [...p, {id:Date.now(),text:wInput.trim(),done:false}]); setWInput(""); toast("Meta adicionada! 🎯"); };
  const toggleWGoal = id => setWGoals(p => p.map(g => g.id===id ? {...g,done:!g.done} : g));
  const delWGoal    = id => askConfirm("Excluir esta meta?", () => { setWGoals(p => p.filter(g => g.id!==id)); toast("Meta excluída."); });

  const startBreath = () => {
    clearInterval(timerRef.current);
    const s = {pIdx:0, cd:PHASES[0].dur, cycles:0};
    stRef.current = s;
    setPIdx(0); setCount(PHASES[0].dur); setCycles(0);
    timerRef.current = setInterval(() => {
      s.cd -= 1;
      if (s.cd<=0) {
        s.pIdx = (s.pIdx+1)%PHASES.length;
        if (s.pIdx===0) { s.cycles+=1; setCycles(s.cycles); }
        s.cd = PHASES[s.pIdx].dur;
        setPIdx(s.pIdx);
      }
      setCount(s.cd);
    }, 1000);
  };
  const stopBreath = () => { clearInterval(timerRef.current); setPIdx(null); setCount(0); };
  const closeSOS   = () => { stopBreath(); setSosOpen(false); };
  const curPh = pIdx!==null ? PHASES[pIdx] : null;
  const sz = curPh ? (curPh.id==="expire"?72:152) : 104;
  const tr = curPh ? (curPh.id==="inspire"?4:curPh.id==="expire"?8:.4) : .5;

  const finishOnboarding = () => {
    setOnboarding(false);
    if (nameInput.trim()) setUserName(nameInput.trim());
  };

  const btnS = (bg, shadow) => ({ display:"inline-flex", alignItems:"center", gap:6, padding:"10px 20px", background:bg, color:"#fff", borderRadius:12, border:"none", fontSize:14, fontWeight:700, cursor:"pointer", boxShadow:shadow||"none" });

  const renderPage = () => {
    switch(page) {
      case "dashboard": return <Dashboard th={th} accent={accent} mood={mood} tasks={tasks} wGoals={wGoals} userName={userName} selectMood={selectMood} toggleTask={toggleTask} MOTIVATIONAL={MOTIVATIONAL} motivIdx={motivIdx.current}/>;
      case "tasks":     return <Tasks th={th} accent={accent} tasks={tasks} tTitle={tTitle} setTTitle={setTTitle} tCat={tCat} setTCat={setTCat} tPri={tPri} setTPri={setTPri} tDate={tDate} setTDate={setTDate} search={search} setSearch={setSearch} fCat={fCat} setFCat={setFCat} fPri={fPri} setFPri={setFPri} addTask={addTask} toggleTask={toggleTask} delTask={delTask} filteredTasks={filteredTasks}/>;
      case "plan":      return <Planner th={th} accent={accent} calMonth={calMonth} setCalMonth={setCalMonth} calDays={calDays} taskDates={taskDates} weekPlan={weekPlan} setWeekPlan={setWeekPlan} wpInput={wpInput} setWpInput={setWpInput} mGoal={mGoal} setMGoal={setMGoal} mGoalInput={mGoalInput} setMGoalInput={setMGoalInput} toast={toast}/>;
      case "goals":     return <Goals th={th} accent={accent} wGoals={wGoals} wInput={wInput} setWInput={setWInput} addWGoal={addWGoal} toggleWGoal={toggleWGoal} delWGoal={delWGoal}/>;
      case "journal":   return <Journal th={th} accent={accent} mood={mood} draft={draft} setDraft={setDraft} saveEntry={saveEntry} entries={entries} delEntry={delEntry}/>;
      case "stats":     return <Stats th={th} accent={accent} tasks={tasks} moodLog={moodLog}/>;
      default:          return null;
    }
  };

  return (
    <>
      <a href="#main-content" style={{position:"absolute",left:-9999,top:0,padding:"8px 16px",background:accent.val,color:"#fff",borderRadius:"0 0 8px 0",fontWeight:700,fontSize:14,zIndex:999,textDecoration:"none"}}
        onFocus={e=>{e.target.style.left="0"}} onBlur={e=>{e.target.style.left="-9999px"}}>
        Pular para o conteúdo
      </a>

      {/* Toasts */}
      <div aria-live="assertive" aria-atomic="true" style={{position:"fixed",top:16,right:16,zIndex:1000,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} role="status" style={{
            padding:"12px 18px",borderRadius:12,fontSize:13,fontWeight:600,color:"#fff",
            background:t.type==="error"?"#f43f5e":"#10b981",
            boxShadow:"0 4px 20px rgba(0,0,0,.18)",pointerEvents:"auto",
            animation:t.out?"toastOut .4s ease forwards":"toastIn .3s ease both",
            display:"flex",alignItems:"center",gap:8,maxWidth:280
          }}>
            {t.type==="error"?<IAlert s={15} c="#fff"/>:<IOk s={15} c="#fff"/>}
            {t.msg}
          </div>
        ))}
      </div>

      {/* Confirm */}
      {confirm && (
        <div role="alertdialog" aria-modal="true" aria-label="Confirmação"
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900,padding:20}}>
          <div className="scale-in" style={{background:th.surface,borderRadius:20,padding:28,maxWidth:320,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.2)",textAlign:"center"}}>
            <IAlert s={32} c="#f59e0b" style={{display:"block",margin:"0 auto 14px"}}/>
            <p style={{fontSize:15,fontWeight:600,color:th.text,marginBottom:20,lineHeight:1.5}}>{confirm.msg}</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setConfirm(null)} style={{padding:"10px 22px",borderRadius:10,border:"1.5px solid "+th.border,background:th.hover,color:th.text,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
              <button autoFocus onClick={()=>{confirm.onOk();setConfirm(null);}} style={{padding:"10px 22px",borderRadius:10,border:"none",background:"#f43f5e",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Excluir</button>
            </div>
          </div>
        </div>
      )}

      {/* Onboarding */}
      {onboarding && (
        <div role="dialog" aria-modal="true" aria-label="Boas-vindas ao OrganizaMente"
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,.65)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:800,padding:20}}>
          <div className="slide-up" style={{background:th.surface,borderRadius:28,padding:36,maxWidth:400,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,.25)",textAlign:"center"}}>
            {obStep===0 ? (
              <>
                <div style={{width:56,height:56,borderRadius:18,background:accent.grad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",boxShadow:"0 6px 20px "+accent.val+"44"}}>
                  <IBrain s={26} c="#fff"/>
                </div>
                <h2 style={{fontSize:22,fontWeight:800,color:th.text,marginBottom:8}}>Bem-vindo ao OrganizaMente! 🧠</h2>
                <p style={{fontSize:14,color:th.sub,lineHeight:1.7,marginBottom:20}}>Sua ferramenta de organização e saúde mental para estudantes universitários.</p>
                <div style={{marginBottom:24}}>
                  <label htmlFor="onbName" style={{fontSize:13,color:th.sub,display:"block",marginBottom:8}}>Como posso te chamar?</label>
                  <input id="onbName" value={nameInput} onChange={e=>setNameInput(e.target.value)}
                    placeholder="Seu nome (opcional)"
                    style={{width:"100%",padding:"11px 14px",borderRadius:12,border:"1.5px solid "+th.border,fontSize:14,color:th.text,outline:"none",boxSizing:"border-box",background:th.input,textAlign:"center"}}/>
                </div>
                <button onClick={()=>setObStep(1)} style={{...btnS(accent.grad,"0 4px 16px rgba(99,102,241,.3)"),width:"100%",justifyContent:"center",fontSize:15}}>
                  Ver tour rápido →
                </button>
                <button onClick={finishOnboarding} style={{marginTop:10,background:"none",border:"none",cursor:"pointer",color:th.muted,fontSize:13,textDecoration:"underline"}}>
                  Pular e começar
                </button>
              </>
            ) : (
              <>
                <div style={{fontSize:40,marginBottom:10}}>{ONBOARDING_STEPS[obStep-1].emoji}</div>
                <h3 style={{fontSize:19,fontWeight:800,color:th.text,marginBottom:8}}>{ONBOARDING_STEPS[obStep-1].title}</h3>
                <p style={{fontSize:14,color:th.sub,lineHeight:1.7,marginBottom:24}}>{ONBOARDING_STEPS[obStep-1].desc}</p>
                <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:20}}>
                  {ONBOARDING_STEPS.map((_,i)=>(
                    <div key={i} style={{width:i===obStep-1?20:7,height:7,borderRadius:99,background:i===obStep-1?accent.val:th.border,transition:"all .3s"}}/>
                  ))}
                </div>
                <div style={{display:"flex",gap:10}}>
                  {obStep>1&&<button onClick={()=>setObStep(s=>s-1)} style={{flex:1,padding:"11px 0",borderRadius:12,border:"1.5px solid "+th.border,background:th.hover,color:th.text,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Anterior</button>}
                  {obStep<ONBOARDING_STEPS.length ? (
                    <button onClick={()=>setObStep(s=>s+1)} style={{...btnS(accent.grad),flex:1,justifyContent:"center",fontSize:14}}>Próximo →</button>
                  ) : (
                    <button onClick={finishOnboarding} style={{...btnS(accent.grad),flex:1,justifyContent:"center",fontSize:14}}>Começar! 🚀</button>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Settings */}
      {showSettings && (
        <div role="dialog" aria-modal="true" aria-label="Configurações"
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20}}>
          <div className="scale-in" style={{background:th.surface,borderRadius:24,padding:32,maxWidth:360,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <h3 style={{fontSize:17,fontWeight:800,color:th.text}}>⚙️ Configurações</h3>
              <button aria-label="Fechar configurações" onClick={()=>setShowSettings(false)}
                style={{background:th.hover,border:"none",cursor:"pointer",color:th.muted,width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <IX s={15}/>
              </button>
            </div>
            <p style={{fontSize:12,fontWeight:700,color:th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Aparência</p>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderRadius:14,background:th.hover,border:"1px solid "+th.border,marginBottom:16}}>
              <span style={{fontSize:14,color:th.text}}>{"Modo "+(darkMode?"Escuro 🌙":"Claro ☀️")}</span>
              <button aria-label={"Ativar modo "+(darkMode?"claro":"escuro")} onClick={()=>setDarkMode(d=>!d)}
                style={{width:48,height:26,borderRadius:99,background:darkMode?accent.val:th.border,border:"none",cursor:"pointer",position:"relative",transition:"background .3s"}}>
                <div style={{width:20,height:20,borderRadius:99,background:"#fff",position:"absolute",top:3,left:darkMode?25:3,transition:"left .3s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
              </button>
            </div>
            <p style={{fontSize:12,fontWeight:700,color:th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Cor Principal</p>
            <div style={{display:"flex",gap:10,marginBottom:20}} role="group" aria-label="Escolher cor principal">
              {ACCENT_COLORS.map((c,i)=>(
                <button key={c.name} aria-label={c.name} aria-pressed={accentIdx===i}
                  onClick={()=>setAccentIdx(i)}
                  style={{width:36,height:36,borderRadius:99,background:c.grad,border:"3px solid "+(accentIdx===i?"#fff":"transparent"),cursor:"pointer",
                    boxShadow:accentIdx===i?"0 0 0 2px "+c.val:"none",transition:"all .2s"}}/>
              ))}
            </div>
            <p style={{fontSize:12,fontWeight:700,color:th.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Saudação</p>
            <div style={{display:"flex",gap:8}}>
              <input value={nameInput||userName} onChange={e=>setNameInput(e.target.value)}
                placeholder="Seu nome" aria-label="Seu nome"
                style={{flex:1,padding:"11px 14px",borderRadius:12,border:"1.5px solid "+th.border,fontSize:14,color:th.text,outline:"none",boxSizing:"border-box",background:th.input}}/>
              <button onClick={()=>{if(nameInput.trim()){setUserName(nameInput.trim());toast("Nome salvo! 👋");}}}
                style={btnS(accent.grad)}><ISave s={15}/></button>
            </div>
          </div>
        </div>
      )}

      {/* Help */}
      {showHelp && (
        <div role="dialog" aria-modal="true" aria-label="Ajuda e documentação"
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20,overflowY:"auto"}}>
          <div className="scale-in" style={{background:th.surface,borderRadius:24,padding:32,maxWidth:400,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.2)",margin:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <h3 style={{fontSize:17,fontWeight:800,color:th.text}}>❓ Ajuda</h3>
              <button aria-label="Fechar ajuda" onClick={()=>setShowHelp(false)}
                style={{background:th.hover,border:"none",cursor:"pointer",color:th.muted,width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <IX s={15}/>
              </button>
            </div>
            {ONBOARDING_STEPS.map(s=>(
              <div key={s.title} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:"1px solid "+th.border}}>
                <span style={{fontSize:24,flexShrink:0}}>{s.emoji}</span>
                <div>
                  <p style={{fontSize:14,fontWeight:700,color:th.text,margin:"0 0 3px"}}>{s.title}</p>
                  <p style={{fontSize:13,color:th.sub,margin:0,lineHeight:1.5}}>{s.desc}</p>
                </div>
              </div>
            ))}
            <button onClick={()=>{setShowHelp(false);setOnboarding(true);setObStep(1);}}
              style={{...btnS(accent.grad,"0 4px 14px rgba(99,102,241,.2)"),marginTop:20,width:"100%",justifyContent:"center"}}>
              Rever tutorial completo
            </button>
          </div>
        </div>
      )}

      {/* SOS */}
      {sosOpen && (
        <div role="dialog" aria-modal="true" aria-label="Exercício de respiração 4-7-8"
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:600,padding:20}}>
          <div className="scale-in" style={{background:th.surface,borderRadius:28,boxShadow:"0 24px 64px rgba(0,0,0,.2)",width:"100%",maxWidth:360,padding:36,textAlign:"center",position:"relative"}}>
            <button onClick={closeSOS} aria-label="Fechar respiração"
              style={{position:"absolute",top:14,right:14,background:th.hover,border:"none",cursor:"pointer",color:th.muted,width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <IX s={15}/>
            </button>
            <div style={{width:48,height:48,borderRadius:16,background:accent.grad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",boxShadow:"0 4px 18px "+accent.val+"55"}}>
              <IWind s={22} c="#fff"/>
            </div>
            <h3 style={{fontSize:20,fontWeight:800,color:th.text,margin:"0 0 4px"}}>Respiração 4-7-8</h3>
            <p style={{fontSize:13,color:th.muted,margin:"0 0 4px"}}>Técnica para acalmar a mente e o corpo</p>
            {cycles>0&&<p style={{fontSize:13,color:"#10b981",fontWeight:700,margin:"6px 0 0"}} aria-live="polite">{"✅ "+cycles+" ciclo"+(cycles>1?"s":"")+" concluído"+(cycles>1?"s":"")}</p>}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",margin:"26px 0"}}>
              <div aria-live="polite" aria-label={curPh ? curPh.label+": "+count+" segundos" : "Pronto para começar"}
                style={{width:sz,height:sz,borderRadius:"50%",background:"linear-gradient(135deg,#818cf8,#2dd4bf)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  boxShadow:"0 8px 36px rgba(99,102,241,.35)",
                  transition:"width "+tr+"s ease-in-out, height "+tr+"s ease-in-out"}}>
                <span style={{fontSize:curPh?40:28,fontWeight:800,color:"#fff"}}>{curPh?count:"🌬️"}</span>
              </div>
            </div>
            {curPh ? (
              <div style={{marginBottom:18}}>
                <p style={{fontSize:20,fontWeight:800,color:th.text,margin:"0 0 4px"}}>{curPh.label}</p>
                <p style={{fontSize:13,color:th.muted,margin:"0 0 14px"}}>{curPh.hint}</p>
                <div style={{background:th.border,borderRadius:999,height:6,overflow:"hidden"}} role="progressbar" aria-valuenow={Math.round((count/curPh.dur)*100)} aria-valuemin={0} aria-valuemax={100}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#818cf8,#2dd4bf)",width:((count/curPh.dur)*100)+"%",transition:"width 1s linear"}}/>
                </div>
              </div>
            ) : (
              <p style={{fontSize:14,color:th.muted,marginBottom:18}}>Pressione Começar e siga as instruções.</p>
            )}
            {pIdx===null ? (
              <button onClick={startBreath}
                style={{width:"100%",padding:"14px 0",background:accent.grad,color:"#fff",borderRadius:14,border:"none",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px "+accent.val+"44"}}>
                Começar
              </button>
            ) : (
              <button onClick={stopBreath}
                style={{width:"100%",padding:"14px 0",background:th.hover,color:th.sub,borderRadius:14,border:"1px solid "+th.border,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Pausar
              </button>
            )}
          </div>
        </div>
      )}

      {/* Header */}
      <header style={{background:darkMode?"rgba(30,41,59,.95)":"rgba(255,255,255,.92)",backdropFilter:"blur(16px)",borderBottom:"1px solid "+th.border,position:"sticky",top:0,zIndex:30}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,borderRadius:14,background:accent.grad,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 14px "+accent.val+"44"}}>
            <IBrain s={20} c="#fff"/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:19,fontWeight:800,color:th.text,letterSpacing:"-.5px"}}>OrganizaMente</div>
            <div style={{fontSize:11,color:th.muted}}>Organização e saúde mental para estudantes</div>
          </div>
          <button aria-label="Ajuda" onClick={()=>setShowHelp(true)}
            style={{background:"none",border:"1px solid "+th.border,borderRadius:10,padding:"6px 8px",cursor:"pointer",color:th.sub,display:"flex",alignItems:"center"}}>
            <IHelp s={17}/>
          </button>
          <button aria-label={darkMode?"Ativar modo claro":"Ativar modo escuro"} onClick={()=>setDarkMode(d=>!d)}
            style={{background:"none",border:"1px solid "+th.border,borderRadius:10,padding:"6px 8px",cursor:"pointer",color:th.sub,display:"flex",alignItems:"center"}}>
            {darkMode?<ISun s={17}/>:<IMoon s={17}/>}
          </button>
          <button aria-label="Configurações" onClick={()=>setShowSettings(true)}
            style={{background:"none",border:"1px solid "+th.border,borderRadius:10,padding:"6px 8px",cursor:"pointer",color:th.sub,display:"flex",alignItems:"center"}}>
            <ISettings s={17}/>
          </button>
        </div>
      </header>

      {/* Nav */}
      <nav role="navigation" aria-label="Navegação principal"
        style={{background:darkMode?"rgba(30,41,59,.95)":"rgba(255,255,255,.92)",backdropFilter:"blur(16px)",borderBottom:"1px solid "+th.border,position:"sticky",top:66,zIndex:29,overflowX:"auto"}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"0 16px",display:"flex",gap:2}}>
          {NAV.map(n=>(
            <button key={n.id} aria-current={page===n.id?"page":undefined}
              onClick={()=>setPage(n.id)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 12px",
                background:"none",border:"none",cursor:"pointer",
                borderBottom:"3px solid "+(page===n.id?accent.val:"transparent"),
                color:page===n.id?accent.val:th.muted,transition:"all .2s",whiteSpace:"nowrap",fontSize:10,fontWeight:page===n.id?700:500}}>
              <span style={{fontSize:16}}>{n.emoji}</span>
              {n.label}
            </button>
          ))}
        </div>
      </nav>

      {/* Main */}
      <main id="main-content" style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 120px"}} role="main">
        {renderPage()}
      </main>

      {/* Footer */}
      <footer style={{textAlign:"center",padding:"0 16px 28px"}} role="contentinfo">
        <p style={{fontSize:11,color:th.muted,margin:"0 0 3px"}}>Projeto Acadêmico · ADS · Universidade São Judas Tadeu</p>
        <p style={{fontSize:10,color:th.muted,margin:0,opacity:.7}}>Kathleen Lohanny · Kauã Santana · Lauanda Jones · Rayanne Raquel · Richard Rosa</p>
      </footer>

      {/* SOS Button */}
      <div style={{position:"fixed",bottom:24,right:16,zIndex:40}}>
        <button onClick={()=>setSosOpen(true)} aria-label="Abrir exercício de respiração SOS"
          style={{display:"flex",alignItems:"center",gap:8,padding:"13px 22px",
            background:"linear-gradient(135deg,#f43f5e,#fb7185)",color:"#fff",borderRadius:999,
            border:"none",fontSize:13,fontWeight:700,cursor:"pointer",
            boxShadow:"0 6px 24px rgba(244,63,94,.45)",animation:"pulse-sos 2s infinite"}}>
          <IWind s={16}/> SOS – Respira
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
