<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrganizaMente</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(160deg,#eff6ff 0%,#f0fdfa 100%);font-family:system-ui,sans-serif;min-height:100vh}
    @keyframes pulse{0%,100%{box-shadow:0 6px 24px rgba(244,63,94,0.4)}50%{box-shadow:0 6px 32px rgba(244,63,94,0.65)}}
    select,input,textarea{font-family:system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

/* ── Lucide icons (inline SVG) ── */
const Icon = ({ d, size=18, color="currentColor", strokeWidth=2, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" {...rest}>
    {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
  </svg>
);
const Brain      = p => <Icon size={p.size||18} color={p.color} d={["M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z","M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z","M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4","M17.599 6.5a3 3 0 0 0 .399-1.375","M6.003 5.125A3 3 0 0 0 6.401 6.5","M3.477 10.896a4 4 0 0 1 .585-.396","M19.938 10.5a4 4 0 0 1 .585.396","M6 18a4 4 0 0 1-1.967-.516","M19.967 17.484A4 4 0 0 1 18 18"]} />;
const Heart      = p => <Icon size={p.size||18} color={p.color} d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>;
const CheckSq    = p => <Icon size={p.size||18} color={p.color} d={["M9 11l3 3L22 4","M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"]} />;
const Square     = p => <Icon size={p.size||18} color={p.color} d="M3 3h18v18H3z"/>;
const BookOpen   = p => <Icon size={p.size||18} color={p.color} d={["M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z","M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"]} />;
const Trash2     = p => <Icon size={p.size||18} color={p.color} d={["M3 6h18","M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6","M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2","M10 11v6","M14 11v6"]} />;
const Plus       = p => <Icon size={p.size||18} color={p.color} d={["M5 12h14","M12 5v14"]} />;
const Save       = p => <Icon size={p.size||18} color={p.color} d={["M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z","M17 21v-8H7v8","M7 3v5h8"]} />;
const Wind       = p => <Icon size={p.size||18} color={p.color} d={["M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2","M9.6 4.6A2 2 0 1 1 11 8H2","M12.6 19.4A2 2 0 1 0 14 16H2"]} />;
const X          = p => <Icon size={p.size||18} color={p.color} d={["M18 6 6 18","M6 6l12 12"]} />;
const AlertTri   = p => <Icon size={p.size||18} color={p.color} d={["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"]} />;

/* ── Data ── */
const MOODS = [
  { id:"feliz",      label:"Feliz",      emoji:"😊", card:"#fffbeb", border:"#fcd34d", text:"#92400e",   alert:false, msg:"Que energia incrível! ☀️ Aproveite esse momento de leveza para avançar nos seus estudos e celebrar cada pequena conquista." },
  { id:"calmo",      label:"Calmo",      emoji:"😌", card:"#f0f9ff", border:"#7dd3fc", text:"#075985",   alert:false, msg:"Perfeito para o foco! 🌊 Esse estado de calma é ideal para absorver conteúdo. Vá no seu ritmo, sem pressa." },
  { id:"ansioso",    label:"Ansioso",    emoji:"😰", card:"#fff7ed", border:"#fdba74", text:"#9a3412",   alert:true,  msg:"Tudo bem sentir isso. 🌿 Ansiedade é um sinal de que você se importa. Tente focar em uma única tarefa por vez e respire." },
  { id:"exausto",    label:"Exausto",    emoji:"😴", card:"#f5f3ff", border:"#c4b5fd", text:"#4c1d95",   alert:true,  msg:"Seu corpo está pedindo descanso. 💤 Ignorar o cansaço pode piorar tudo. Uma pausa agora é produtividade amanhã." },
  { id:"estressado", label:"Estressado", emoji:"😤", card:"#fff1f2", border:"#fda4af", text:"#9f1239",   alert:true,  msg:"Respira. 🤝 O estresse é real, mas ele passa. Priorize o essencial e deixe o resto para depois. Você não precisa ser perfeito." },
];
const CATS = ["Estudos","Trabalho","Pessoal"];
const PRIS = ["Baixa","Média","Alta"];
const CAT_S = { Estudos:{bg:"#dbeafe",color:"#1d4ed8"}, Trabalho:{bg:"#ede9fe",color:"#6d28d9"}, Pessoal:{bg:"#ccfbf1",color:"#0f766e"} };
const PRI_S = { Baixa:{bg:"#dcfce7",color:"#15803d"}, Média:{bg:"#fef9c3",color:"#a16207"}, Alta:{bg:"#fee2e2",color:"#b91c1c"} };
const PHASES = [
  { id:"inspire", label:"Inspire", dur:4, hint:"Inspire lentamente pelo nariz..." },
  { id:"hold",    label:"Segure",  dur:7, hint:"Segure o ar com calma..." },
  { id:"expire",  label:"Expire",  dur:8, hint:"Expire lentamente pela boca..." },
];

function App() {
  const [mood,    setMood]    = useState(null);
  const [tasks,   setTasks]   = useState([]);
  const [tTitle,  setTTitle]  = useState("");
  const [tCat,    setTCat]    = useState("Estudos");
  const [tPri,    setTPri]    = useState("Média");
  const [draft,   setDraft]   = useState("");
  const [entries, setEntries] = useState([]);
  const [sosOpen, setSosOpen] = useState(false);
  const [pIdx,    setPIdx]    = useState(null);
  const [count,   setCount]   = useState(0);
  const [cycles,  setCycles]  = useState(0);
  const timerRef = useRef(null);
  const stRef    = useRef({});

  const addTask = () => {
    if (!tTitle.trim()) return;
    setTasks(p => [...p, { id:Date.now(), title:tTitle.trim(), cat:tCat, pri:tPri, done:false }]);
    setTTitle("");
  };
  const toggleTask = id => setTasks(p => p.map(t => t.id===id?{...t,done:!t.done}:t));
  const delTask    = id => setTasks(p => p.filter(t=>t.id!==id));
  const pending = tasks.filter(t=>!t.done).length;
  const wl = pending<=2 ? {label:"Carga Leve ✅",bg:"#dcfce7",color:"#15803d"}
           : pending<=4 ? {label:"Carga Moderada ⚠️",bg:"#fef9c3",color:"#a16207"}
           :              {label:"Carga Crítica 🚨",bg:"#fee2e2",color:"#b91c1c"};

  const saveEntry = () => {
    if (!draft.trim()) return;
    setEntries(p => [{id:Date.now(),text:draft.trim(),date:new Date().toLocaleString("pt-BR")},...p]);
    setDraft("");
  };
  const delEntry = id => setEntries(p=>p.filter(e=>e.id!==id));

  const startBreath = () => {
    clearInterval(timerRef.current);
    const s = {pIdx:0,cd:PHASES[0].dur,cycles:0};
    stRef.current = s;
    setPIdx(0); setCount(PHASES[0].dur); setCycles(0);
    timerRef.current = setInterval(()=>{
      s.cd-=1;
      if(s.cd<=0){
        s.pIdx=(s.pIdx+1)%PHASES.length;
        if(s.pIdx===0){s.cycles+=1;setCycles(s.cycles);}
        s.cd=PHASES[s.pIdx].dur;
        setPIdx(s.pIdx);
      }
      setCount(s.cd);
    },1000);
  };
  const stopBreath = () => {clearInterval(timerRef.current);setPIdx(null);setCount(0);};
  const closeSOS   = () => {stopBreath();setSosOpen(false);};
  const curPh = pIdx!==null ? PHASES[pIdx] : null;
  const sz = curPh ? (curPh.id==="expire"?80:160) : 112;
  const tr = curPh ? (curPh.id==="inspire"?4:curPh.id==="expire"?8:0.4) : 0.5;

  const card = {background:"#fff",borderRadius:20,border:"1px solid #dbeafe",padding:24,marginBottom:20};
  const inp  = {width:"100%",padding:"11px 16px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:14,color:"#334155",outline:"none",boxSizing:"border-box"};

  return (
    <>
      {/* Header */}
      <header style={{background:"rgba(255,255,255,0.85)",backdropFilter:"blur(12px)",borderBottom:"1px solid #dbeafe",position:"sticky",top:0,zIndex:30}}>
        <div style={{maxWidth:680,margin:"0 auto",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#60a5fa,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 12px rgba(96,165,250,0.3)"}}>
            <Brain size={22} color="#fff"/>
          </div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#1e293b",letterSpacing:"-0.5px"}}>OrganizaMente</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>Organização e saúde mental para estudantes</div>
          </div>
        </div>
      </header>

      <main style={{maxWidth:680,margin:"0 auto",padding:"28px 20px 120px"}}>

        {/* Mood */}
        <section style={card}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
            <Heart size={18} color="#fb7185"/>
            <span style={{fontSize:15,fontWeight:600,color:"#475569"}}>Como está sua mente hoje?</span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
            {MOODS.map(m=>{
              const active=mood?.id===m.id;
              return (
                <button key={m.id} onClick={()=>setMood(active?null:m)} style={{
                  display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                  padding:"12px 16px",borderRadius:14,
                  border:`2px solid ${active?"#93c5fd":"#e2e8f0"}`,
                  background:active?"#eff6ff":"#f8fafc",cursor:"pointer",
                  transform:active?"scale(1.05)":"scale(1)",transition:"all 0.2s",outline:"none",
                  boxShadow:active?"0 4px 12px rgba(96,165,250,0.2)":"none",
                }}>
                  <span style={{fontSize:24}}>{m.emoji}</span>
                  <span style={{fontSize:12,fontWeight:600,color:active?"#3b82f6":"#64748b"}}>{m.label}</span>
                </button>
              );
            })}
          </div>
          {mood&&(
            <div style={{borderRadius:14,padding:16,border:`1.5px solid ${mood.border}`,background:mood.card,transition:"all 0.3s"}}>
              {mood.alert&&(
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8,color:mood.text,opacity:0.75}}>
                  <AlertTri size={14}/> Atenção: priorize o essencial e diminua o ritmo agora.
                </div>
              )}
              <p style={{fontSize:14,lineHeight:1.7,margin:0,color:mood.text}}>{mood.msg}</p>
            </div>
          )}
        </section>

        {/* Tasks */}
        <section style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <CheckSq size={18} color="#60a5fa"/>
              <span style={{fontSize:15,fontWeight:600,color:"#475569"}}>Gerenciador de Tarefas</span>
            </div>
            <span style={{fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:999,background:wl.bg,color:wl.color}}>{wl.label}</span>
          </div>
          <div style={{marginBottom:18}}>
            <input value={tTitle} onChange={e=>setTTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}
              placeholder="Título da tarefa..." style={{...inp,marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <select value={tCat} onChange={e=>setTCat(e.target.value)}
                style={{flex:1,padding:"10px 12px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:14,color:"#334155",background:"#fff",outline:"none"}}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <select value={tPri} onChange={e=>setTPri(e.target.value)}
                style={{flex:1,padding:"10px 12px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:14,color:"#334155",background:"#fff",outline:"none"}}>
                {PRIS.map(p=><option key={p}>{p}</option>)}
              </select>
              <button onClick={addTask} style={{padding:"10px 18px",background:"linear-gradient(135deg,#60a5fa,#38bdf8)",color:"#fff",borderRadius:12,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(96,165,250,0.3)"}}>
                <Plus size={16}/> Adicionar
              </button>
            </div>
          </div>
          {tasks.length===0?(
            <div style={{textAlign:"center",padding:"36px 0",color:"#cbd5e1"}}>
              <CheckSq size={36} color="#e2e8f0" style={{display:"block",margin:"0 auto 10px"}}/>
              <p style={{fontSize:14,margin:0}}>Adicione sua primeira tarefa 🎯</p>
            </div>
          ):(
            <ul style={{listStyle:"none",margin:0,padding:0,display:"flex",flexDirection:"column",gap:8}}>
              {tasks.map(t=>(
                <li key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:14,border:`1.5px solid ${t.done?"#f1f5f9":"#e2e8f0"}`,background:t.done?"#f8fafc":"#fff",opacity:t.done?0.55:1,transition:"all 0.2s"}}>
                  <button onClick={()=>toggleTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#60a5fa",padding:0,display:"flex"}}>
                    {t.done?<CheckSq size={20}/>:<Square size={20}/>}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:14,fontWeight:500,color:t.done?"#94a3b8":"#334155",textDecoration:t.done?"line-through":"none"}}>{t.title}</p>
                    <div style={{display:"flex",gap:6,marginTop:5}}>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,fontWeight:600,background:CAT_S[t.cat].bg,color:CAT_S[t.cat].color}}>{t.cat}</span>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,fontWeight:600,background:PRI_S[t.pri].bg,color:PRI_S[t.pri].color}}>{t.pri}</span>
                    </div>
                  </div>
                  <button onClick={()=>delTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",padding:0,display:"flex"}}
                    onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"} onMouseLeave={e=>e.currentTarget.style.color="#cbd5e1"}>
                    <Trash2 size={16}/>
                  </button>
                </li>
              ))}
            </ul>
          )}
        </section>

        {/* Diary */}
        <section style={card}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <BookOpen size={18} color="#2dd4bf"/>
            <span style={{fontSize:15,fontWeight:600,color:"#475569"}}>Diário de Desabafo</span>
          </div>
          <p style={{fontSize:13,color:"#94a3b8",marginBottom:14}}>Esvazie sua mente antes de estudar ✍️</p>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)}
            placeholder="O que está na sua cabeça agora? Escreva livremente, sem julgamentos..."
            rows={4}
            style={{...inp,resize:"none",lineHeight:1.7}}/>
          <button onClick={saveEntry} style={{marginTop:12,display:"inline-flex",alignItems:"center",gap:6,padding:"10px 22px",background:"linear-gradient(135deg,#2dd4bf,#34d399)",color:"#fff",borderRadius:12,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(45,212,191,0.3)"}}>
            <Save size={16}/> Salvar Relato
          </button>
          {entries.length>0&&(
            <div style={{marginTop:24}}>
              <p style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Histórico de Relatos</p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {entries.map(e=>(
                  <div key={e.id} style={{background:"#f0fdfa",border:"1.5px solid #99f6e4",borderRadius:14,padding:16}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                      <p style={{flex:1,fontSize:14,color:"#334155",lineHeight:1.7,margin:0}}>{e.text}</p>
                      <button onClick={()=>delEntry(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#a7f3d0",padding:0,flexShrink:0}}
                        onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"} onMouseLeave={e=>e.currentTarget.style.color="#a7f3d0"}>
                        <Trash2 size={15}/>
                      </button>
                    </div>
                    <p style={{fontSize:11,color:"#5eead4",marginTop:8,marginBottom:0}}>📅 {e.date}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </section>

        {/* Footer */}
        <div style={{textAlign:"center",paddingTop:8}}>
          <p style={{fontSize:12,color:"#94a3b8",margin:"0 0 4px"}}>Projeto Acadêmico · ADS · Universidade São Judas Tadeu</p>
          <p style={{fontSize:11,color:"#cbd5e1",margin:0}}>Kathleen Lohanny · Kauã Santana · Lauanda Jones · Rayanne Raquel · Richard Rosa</p>
        </div>
      </main>

      {/* SOS Button */}
      <div style={{position:"fixed",bottom:24,right:20,zIndex:40}}>
        <button onClick={()=>setSosOpen(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"13px 24px",background:"linear-gradient(135deg,#f43f5e,#fb7185)",color:"#fff",borderRadius:999,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 6px 24px rgba(244,63,94,0.4)",animation:"pulse 2s infinite"}}>
          <Wind size={17}/> Precisa Desacelerar? (SOS)
        </button>
      </div>

      {/* SOS Modal */}
      {sosOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:20}}>
          <div style={{background:"#fff",borderRadius:28,boxShadow:"0 24px 64px rgba(0,0,0,0.18)",width:"100%",maxWidth:380,padding:36,textAlign:"center",position:"relative"}}>
            <button onClick={closeSOS} style={{position:"absolute",top:16,right:16,background:"#f1f5f9",border:"none",cursor:"pointer",color:"#94a3b8",width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <X size={16}/>
            </button>
            <div style={{width:48,height:48,borderRadius:16,background:"linear-gradient(135deg,#60a5fa,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 4px 16px rgba(96,165,250,0.3)"}}>
              <Wind size={22} color="#fff"/>
            </div>
            <h3 style={{fontSize:21,fontWeight:800,color:"#1e293b",margin:"0 0 6px"}}>Respiração 4-7-8</h3>
            <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 6px"}}>Técnica para acalmar a mente e o corpo</p>
            {cycles>0&&<p style={{fontSize:13,color:"#14b8a6",fontWeight:700,margin:"4px 0 0"}}>✅ {cycles} ciclo{cycles>1?"s":""} concluído{cycles>1?"s":""}</p>}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",margin:"28px 0"}}>
              <div style={{width:sz,height:sz,borderRadius:"50%",background:"linear-gradient(135deg,#93c5fd,#2dd4bf)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 32px rgba(96,165,250,0.35)",transition:`width ${tr}s ease-in-out, height ${tr}s ease-in-out`}}>
                <span style={{fontSize:curPh?42:30,fontWeight:800,color:"#fff"}}>{curPh?count:"🌬️"}</span>
              </div>
            </div>
            {curPh?(
              <div style={{marginBottom:20}}>
                <p style={{fontSize:21,fontWeight:800,color:"#1e293b",margin:"0 0 4px"}}>{curPh.label}</p>
                <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 16px"}}>{curPh.hint}</p>
                <div style={{background:"#f1f5f9",borderRadius:999,height:7,overflow:"hidden"}}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#93c5fd,#2dd4bf)",width:`${(count/curPh.dur)*100}%`,transition:"width 1s linear"}}/>
                </div>
              </div>
            ):(
              <p style={{fontSize:14,color:"#94a3b8",marginBottom:20}}>Pressione Começar e siga as instruções na tela.</p>
            )}
            {pIdx===null?(
              <button onClick={startBreath} style={{width:"100%",padding:"14px 0",background:"linear-gradient(135deg,#60a5fa,#2dd4bf)",color:"#fff",borderRadius:14,border:"none",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(96,165,250,0.3)"}}>
                Começar
              </button>
            ):(
              <button onClick={stopBreath} style={{width:"100%",padding:"14px 0",background:"#f1f5f9",color:"#64748b",borderRadius:14,border:"none",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Pausar
              </button>
            )}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
